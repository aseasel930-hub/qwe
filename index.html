<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>عجلة الحظ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            direction: rtl;
        }

        .container {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 60px;
            backdrop-filter: blur(5px);
        }

        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 0 8px rgba(255,215,0,0.3), 0 20px 40px rgba(0,0,0,0.5);
        }

        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 45px solid #ffd700;
            z-index: 10;
        }

        .pointer::after {
            content: "▼";
            position: absolute;
            top: -50px;
            left: -14px;
            font-size: 28px;
            color: #ffd700;
        }

        .spin-btn {
            margin-top: 35px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            padding: 12px 35px;
            font-size: 22px;
            font-weight: bold;
            color: #1a1a2e;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        .spin-btn:active {
            transform: scale(0.95);
        }

        .spin-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-message {
            margin-top: 20px;
            padding: 12px;
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
        }

        .error-message {
            margin-top: 15px;
            padding: 12px;
            background: rgba(255,0,0,0.3);
            border-radius: 30px;
            color: #ff6666;
            font-size: 14px;
        }

        .spark {
            position: fixed;
            width: 5px;
            height: 5px;
            background: radial-gradient(circle, #ffd700, #ff6600);
            border-radius: 50%;
            pointer-events: none;
            animation: sparkAnim 0.8s ease-out forwards;
        }

        @keyframes sparkAnim {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        .thunder {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes thunderFlash {
            0% { opacity: 0; }
            10% { opacity: 1; }
            20% { opacity: 0; }
            30% { opacity: 0.6; }
            40% { opacity: 0; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="wheel-container">
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
        <div class="pointer"></div>
    </div>
    <button class="spin-btn" id="spinBtn">🎡 دَوِّر 🎡</button>
    <div id="resultMessage" class="result-message"></div>
</div>
<div class="thunder" id="thunder"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    // ==================== الجوائز (مبسطة) ====================
    const COLORS = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD'];
    
    // الجوائز فقط (5 أقسام فقط)
    const SEGMENTS = ['بونص 5%', 'بونص 10%', '5000', '10000', 'حظ اوفر'];
    const SEGMENT_COUNT = SEGMENTS.length;
    const ANGLE_PER_SEGMENT = (Math.PI * 2) / SEGMENT_COUNT;
    
    let canvas = document.getElementById('wheelCanvas');
    let ctx = canvas.getContext('2d');
    let currentAngle = 0;
    let spinning = false;
    let spinStartTime = 0;
    let spinDuration = 3000;
    let targetRotation = 0;
    
    // قراءة البيانات من الرابط
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user_id');
    const canSpin = urlParams.get('can_spin') === 'true';
    const injectedPrize = urlParams.get('prize'); // الجائزة من البوت
    
    if (!userId) {
        showError('❌ خطأ: لم يتم العثور على معرف المستخدم');
        document.getElementById('spinBtn').disabled = true;
        document.getElementById('spinBtn').classList.add('disabled');
    }
    
    if (!canSpin) {
        showError('❌ لا يمكنك التدوير الآن!\nيرجى الانتظار 24 ساعة');
        document.getElementById('spinBtn').disabled = true;
        document.getElementById('spinBtn').classList.add('disabled');
    }
    
    // تأثيرات
    function createSpark(x, y) {
        const spark = document.createElement('div');
        spark.className = 'spark';
        spark.style.left = x + 'px';
        spark.style.top = y + 'px';
        document.body.appendChild(spark);
        setTimeout(() => spark.remove(), 800);
    }
    
    function createSparks() {
        const rect = canvas.getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;
        const r = rect.width/2;
        for(let i = 0; i < 40; i++) {
            const angle = Math.random() * Math.PI * 2;
            const x = cx + Math.cos(angle) * (r + Math.random() * 40);
            const y = cy + Math.sin(angle) * (r + Math.random() * 40);
            setTimeout(() => createSpark(x, y), Math.random() * 300);
        }
    }
    
    function thunderEffect() {
        const thunder = document.getElementById('thunder');
        thunder.style.animation = 'thunderFlash 0.4s ease-out';
        setTimeout(() => thunder.style.animation = '', 400);
    }
    
    // رسم العجلة
    function drawWheel(rotationAngle = 0) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width/2, cy = canvas.height/2, r = canvas.width/2;
        
        for(let i = 0; i < SEGMENT_COUNT; i++) {
            const start = i * ANGLE_PER_SEGMENT + rotationAngle;
            const end = (i+1) * ANGLE_PER_SEGMENT + rotationAngle;
            
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, r, start, end);
            ctx.fillStyle = COLORS[i % COLORS.length];
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(start + ANGLE_PER_SEGMENT/2);
            ctx.textAlign = "center";
            ctx.fillStyle = "#fff";
            ctx.font = "bold 16px 'Segoe UI'";
            let txt = SEGMENTS[i];
            if(txt === 'بونص 5%') txt = '5%';
            if(txt === 'بونص 10%') txt = '10%';
            if(txt === 'حظ اوفر') txt = '😅';
            ctx.fillText(txt, r * 0.65, 5);
            ctx.restore();
        }
        
        // مركز العجلة
        ctx.beginPath();
        ctx.arc(cx, cy, 40, 0, Math.PI*2);
        ctx.fillStyle = '#ffd700';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, 30, 0, Math.PI*2);
        ctx.fillStyle = '#1a1a2e';
        ctx.fill();
        ctx.fillStyle = '#ffd700';
        ctx.font = "bold 22px 'Segoe UI'";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("🎡", cx, cy);
    }
    
    // تحديد الجائزة من الزاوية
    function getPrizeFromAngle(angle) {
        let norm = angle % (Math.PI * 2);
        if(norm < 0) norm += Math.PI * 2;
        const pointerAngle = -Math.PI / 2;
        let rel = (norm - pointerAngle + Math.PI * 2) % (Math.PI * 2);
        let idx = Math.floor(rel / ANGLE_PER_SEGMENT);
        return SEGMENTS[(SEGMENT_COUNT - idx) % SEGMENT_COUNT];
    }
    
    // الدوران
    function spinWheel() {
        if(spinning) return;
        if(!canSpin) {
            showError('❌ لا يمكنك التدوير الآن! انتظر 24 ساعة');
            return;
        }
        
        spinning = true;
        spinStartTime = Date.now();
        
        createSparks();
        thunderEffect();
        
        // تحديد الجائزة المستهدفة (من البوت أو عشوائية)
        let targetPrize = injectedPrize;
        let targetIndex;
        
        if(targetPrize && SEGMENTS.includes(targetPrize)) {
            targetIndex = SEGMENTS.indexOf(targetPrize);
        } else {
            targetIndex = Math.floor(Math.random() * SEGMENT_COUNT);
            targetPrize = SEGMENTS[targetIndex];
        }
        
        // حساب الزاوية المستهدفة
        const targetAnglePos = (Math.PI * 2) - (targetIndex * ANGLE_PER_SEGMENT) - ANGLE_PER_SEGMENT/2;
        const extraSpins = 6 * Math.PI * 2 + Math.random() * 3 * Math.PI * 2;
        let newTarget = targetAnglePos + extraSpins;
        let delta = newTarget - currentAngle;
        targetRotation = currentAngle + delta;
        
        function animate() {
            const elapsed = Date.now() - spinStartTime;
            let progress = Math.min(1, elapsed / spinDuration);
            const ease = 1 - Math.pow(1 - progress, 3);
            currentAngle = currentAngle + (targetRotation - currentAngle) * ease;
            drawWheel(currentAngle);
            
            if(progress < 1) {
                requestAnimationFrame(animate);
            } else {
                currentAngle = targetRotation;
                drawWheel(currentAngle);
                const finalPrize = getPrizeFromAngle(currentAngle);
                spinning = false;
                
                thunderEffect();
                
                // إرسال النتيجة إلى البوت (هذا هو المهم!)
                tg.sendData(`${finalPrize}|${userId}`);
                
                const resultDiv = document.getElementById('resultMessage');
                if(finalPrize === 'حظ اوفر') {
                    resultDiv.innerHTML = '😅 <b>حظ أوفر!</b> 😅<br>جرب حظك غداً!';
                } else {
                    resultDiv.innerHTML = `🎉 <b>مبروك!</b> 🎉<br>لقد ربحت: <span style="font-size:20px;">${finalPrize}</span><br>سيتم إضافة الجائزة تلقائياً!`;
                }
                
                tg.showPopup({
                    title: finalPrize === 'حظ اوفر' ? '😅 حظ أوفر' : '🎉 مبروك!',
                    message: finalPrize === 'حظ اوفر' ? 'لم تحصل على جائزة، جرب غداً!' : `لقد ربحت ${finalPrize}! سيتم إضافة الجائزة إلى رصيدك.`,
                    buttons: [{type: 'ok', text: 'حسناً'}]
                });
                
                setTimeout(() => tg.close(), 2500);
            }
        }
        requestAnimationFrame(animate);
    }
    
    function showError(msg) {
        const err = document.createElement('div');
        err.className = 'error-message';
        err.innerHTML = msg;
        document.querySelector('.container').appendChild(err);
        setTimeout(() => err.remove(), 5000);
    }
    
    // رابط الصورة الخلفية - غيّر هذا الرابط
    document.body.style.backgroundImage = "url('https://your-domain.com/bg.jpg')";
    document.body.style.backgroundSize = "cover";
    
    drawWheel();
    document.getElementById('spinBtn').onclick = spinWheel;
    
    console.log('Ready - User:', userId, 'CanSpin:', canSpin, 'Prize:', injectedPrize);
</script>
</body>
</html>
