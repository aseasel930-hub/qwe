<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>عجلة الحظ</title>
    <!-- Telegram WebApp Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            direction: rtl;
        }

        /* الحاوية الرئيسية */
        .container {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 60px;
            backdrop-filter: blur(5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* العجلة */
        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 0 10px rgba(255, 215, 0, 0.3), 0 0 0 15px rgba(255, 215, 0, 0.1), 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: box-shadow 0.3s ease;
        }

        /* المؤشر */
        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 50px solid #ffd700;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.3));
            z-index: 10;
        }

        .pointer::after {
            content: "▼";
            position: absolute;
            top: -55px;
            left: -12px;
            font-size: 28px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* زر التدوير */
        .spin-btn {
            margin-top: 40px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            color: #1a1a2e;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .spin-btn:active {
            transform: scale(0.95);
        }

        .spin-btn.disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
            filter: grayscale(0.3);
        }

        /* تأثيرات الضوء */
        .light-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .thunder {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
        }

        /* رسالة النتيجة */
        .result-message {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 30px;
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
            backdrop-filter: blur(5px);
        }

        /* تأثير الشرر */
        .spark {
            position: fixed;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #ffd700, #ff6600);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1001;
            animation: sparkAnim 1s ease-out forwards;
        }

        @keyframes sparkAnim {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        /* رسالة الخطأ */
        .error-message {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 0, 0, 0.3);
            border-radius: 30px;
            color: #ff6666;
            font-size: 16px;
        }

        /* أنيميشن الرعد */
        @keyframes thunderFlash {
            0% { opacity: 0; }
            10% { opacity: 1; }
            20% { opacity: 0; }
            30% { opacity: 0.8; }
            40% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* تحميل */
        .loading {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 215, 0, 0.3);
            border-radius: 50%;
            border-top-color: #ffd700;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="wheel-container">
        <canvas id="wheelCanvas" width="600" height="600"></canvas>
        <div class="pointer"></div>
    </div>
    <button class="spin-btn" id="spinBtn">🎡 دَوِّر 🎡</button>
    <div id="resultMessage" class="result-message"></div>
</div>

<!-- تأثيرات -->
<div class="light-effect" id="lightEffect"></div>
<div class="thunder" id="thunder"></div>

<script>
    // تهيئة Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.enableClosingConfirmation();
    
    // ==================== إعدادات العجلة ====================
    // ألوان الأجزاء - يمكنك تغييرها
    const COLORS = [
        '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD',
        '#F7B731', '#5D9BEC', '#F9D56E', '#E85D75', '#A8E6CF', '#FFD93D'
    ];
    
    // الجوائز
    const SEGMENTS = [
        'بونص 5%', 'بونص 10%', '5000', '10000', 'حظ اوفر', 'بونص 5%',
        '5000', 'حظ اوفر', '10000', 'بونص 10%', 'حظ اوفر', '5000'
    ];
    
    const SEGMENT_COUNT = SEGMENTS.length;
    const ANGLE_PER_SEGMENT = (Math.PI * 2) / SEGMENT_COUNT;
    
    // متغيرات العجلة
    let canvas = document.getElementById('wheelCanvas');
    let ctx = canvas.getContext('2d');
    let currentAngle = 0;
    let spinning = false;
    let spinStartTime = 0;
    let spinDuration = 3000; // 3 ثواني
    let targetRotation = 0;
    let finalSegmentIndex = 0;
    
    // ==================== قراءة البيانات من الرابط ====================
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user_id');
    const canSpin = urlParams.get('can_spin') === 'true';
    
    // الجائزة التي سيتم حقنها (تأتي من البوت)
    let injectedPrize = null;
    
    // التحقق من البيانات
    if (!userId) {
        showError('❌ خطأ: لم يتم العثور على معرف المستخدم');
        document.getElementById('spinBtn').disabled = true;
        document.getElementById('spinBtn').classList.add('disabled');
    }
    
    if (!canSpin) {
        showError('❌ لا يمكنك التدوير الآن!\nيرجى الانتظار 24 ساعة من آخر تدويرة');
        document.getElementById('spinBtn').disabled = true;
        document.getElementById('spinBtn').classList.add('disabled');
    }
    
    // ==================== دالة توليد الشرر ====================
    function createSpark(x, y) {
        const spark = document.createElement('div');
        spark.className = 'spark';
        spark.style.left = x + 'px';
        spark.style.top = y + 'px';
        document.body.appendChild(spark);
        setTimeout(() => spark.remove(), 1000);
    }
    
    function createSparksAroundWheel() {
        const rect = canvas.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const radius = rect.width / 2;
        
        for (let i = 0; i < 50; i++) {
            const angle = Math.random() * Math.PI * 2;
            const r = radius + Math.random() * 50;
            const x = centerX + Math.cos(angle) * r;
            const y = centerY + Math.sin(angle) * r;
            setTimeout(() => createSpark(x, y), Math.random() * 500);
        }
    }
    
    // دالة تأثير الرعد
    function thunderEffect() {
        const thunder = document.getElementById('thunder');
        thunder.style.animation = 'thunderFlash 0.5s ease-out';
        setTimeout(() => {
            thunder.style.animation = '';
        }, 500);
    }
    
    // دالة تأثير الضوء المتقطع
    function lightFlashEffect() {
        const lightEffect = document.getElementById('lightEffect');
        lightEffect.style.backgroundColor = 'rgba(255, 215, 0, 0.3)';
        setTimeout(() => {
            lightEffect.style.backgroundColor = 'transparent';
        }, 100);
        setTimeout(() => {
            lightEffect.style.backgroundColor = 'rgba(255, 215, 0, 0.2)';
        }, 200);
        setTimeout(() => {
            lightEffect.style.backgroundColor = 'transparent';
        }, 300);
    }
    
    // ==================== رسم العجلة ====================
    function drawWheel(rotationAngle = 0) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = canvas.width / 2;
        
        for (let i = 0; i < SEGMENT_COUNT; i++) {
            const startAngle = i * ANGLE_PER_SEGMENT + rotationAngle;
            const endAngle = (i + 1) * ANGLE_PER_SEGMENT + rotationAngle;
            
            // رسم القطعة
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, startAngle, endAngle);
            ctx.fillStyle = COLORS[i % COLORS.length];
            ctx.fill();
            
            // رسم الحدود
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, startAngle, endAngle);
            ctx.lineTo(centerX, centerY);
            ctx.stroke();
            
            // رسم النص
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(startAngle + ANGLE_PER_SEGMENT / 2);
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "#fff";
            ctx.font = "bold 18px 'Segoe UI', Tahoma";
            ctx.shadowBlur = 0;
            
            const textRadius = radius * 0.7;
            const text = SEGMENTS[i];
            let displayText = text;
            if (text === 'حظ اوفر') displayText = '😅';
            if (text === 'بونص 5%') displayText = '5%';
            if (text === 'بونص 10%') displayText = '10%';
            
            ctx.fillText(displayText, textRadius, 5);
            ctx.restore();
        }
        
        // رسم الدائرة الداخلية (مركز العجلة)
        ctx.beginPath();
        ctx.arc(centerX, centerY, 50, 0, Math.PI * 2);
        ctx.fillStyle = '#ffd700';
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.stroke();
        
        // رسم صورة في المنتصف (يمكنك تغيير الرابط)
        // ctx.drawImage(yourCenterImage, centerX-35, centerY-35, 70, 70);
        // إذا أردت إضافة صورة في المنتصف، استخدم الكود أعلاه
        
        ctx.beginPath();
        ctx.arc(centerX, centerY, 40, 0, Math.PI * 2);
        ctx.fillStyle = '#1a1a2e';
        ctx.fill();
        ctx.fillStyle = '#ffd700';
        ctx.font = "bold 24px 'Segoe UI'";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("🎡", centerX, centerY);
    }
    
    // ==================== تحديد القطعة بناءً على الزاوية ====================
    function getSegmentFromAngle(angle) {
        let normalizedAngle = angle % (Math.PI * 2);
        if (normalizedAngle < 0) normalizedAngle += Math.PI * 2;
        
        // المؤشر في الأعلى (زاوية -PI/2)
        const pointerAngle = -Math.PI / 2;
        let relativeAngle = (normalizedAngle - pointerAngle + Math.PI * 2) % (Math.PI * 2);
        let segmentIndex = Math.floor(relativeAngle / ANGLE_PER_SEGMENT);
        return (SEGMENT_COUNT - segmentIndex) % SEGMENT_COUNT;
    }
    
    // ==================== دوران العجلة ====================
    function spinWheel() {
        if (spinning) return;
        
        // إذا كان المستخدم لا يحق له التدوير
        if (!canSpin) {
            showError('❌ لا يمكنك التدوير الآن! يرجى الانتظار 24 ساعة');
            return;
        }
        
        // إذا لم يتم حقن جائزة من البوت - نستخدم جائزة عشوائية
        let targetPrize = injectedPrize;
        if (!targetPrize) {
            // إذا لم يتم حقن جائزة، نختار جائزة عشوائية
            const randomIndex = Math.floor(Math.random() * SEGMENT_COUNT);
            targetPrize = SEGMENTS[randomIndex];
            finalSegmentIndex = randomIndex;
        } else {
            // نبحث عن موقع الجائزة في مصفوفة SEGMENTS
            const prizeIndex = SEGMENTS.findIndex(s => s === targetPrize);
            if (prizeIndex !== -1) {
                finalSegmentIndex = prizeIndex;
            } else {
                // إذا لم نجد الجائزة، نستخدم عشوائي
                const randomIndex = Math.floor(Math.random() * SEGMENT_COUNT);
                finalSegmentIndex = randomIndex;
                targetPrize = SEGMENTS[randomIndex];
            }
        }
        
        spinning = true;
        spinStartTime = Date.now();
        
        // تأثيرات
        createSparksAroundWheel();
        thunderEffect();
        for(let i = 0; i < 10; i++) {
            setTimeout(() => lightFlashEffect(), i * 100);
        }
        
        // الزاوية الحالية
        const currentRot = currentAngle;
        
        // الزاوية المطلوبة للقطعة المستهدفة (المؤشر في الأعلى)
        const targetSegmentAngle = (Math.PI * 2) - (finalSegmentIndex * ANGLE_PER_SEGMENT) - ANGLE_PER_SEGMENT / 2;
        
        // إضافة لفات إضافية (8-12 لفة)
        const extraSpins = 8 * Math.PI * 2 + Math.random() * 4 * Math.PI * 2;
        
        // الزاوية النهائية
        let targetAngle = targetSegmentAngle + extraSpins;
        
        // التعديل لجعل الدورة سلسة
        let delta = targetAngle - currentRot;
        targetAngle = currentRot + delta;
        
        targetRotation = targetAngle;
        
        // أنيميشن الدوران
        function animateSpin() {
            const now = Date.now();
            const elapsed = now - spinStartTime;
            let progress = Math.min(1, elapsed / spinDuration);
            
            // easeOutCubic للتوقف البطيء
            const easeProgress = 1 - Math.pow(1 - progress, 3);
            
            currentAngle = currentRot + (targetRotation - currentRot) * easeProgress;
            drawWheel(currentAngle);
            
            if (progress < 1) {
                requestAnimationFrame(animateSpin);
            } else {
                // انتهى الدوران
                currentAngle = targetRotation;
                drawWheel(currentAngle);
                
                // التحقق من الجائزة النهائية
                const finalAngle = currentAngle % (Math.PI * 2);
                const segmentIdx = getSegmentFromAngle(finalAngle);
                const prize = SEGMENTS[segmentIdx];
                
                spinning = false;
                
                // تأثيرات نهاية الدوران
                thunderEffect();
                for(let i = 0; i < 5; i++) {
                    setTimeout(() => lightFlashEffect(), i * 50);
                }
                
                // إرسال النتيجة إلى البوت
                const result = `${prize}|${userId}`;
                tg.sendData(result);
                
                // عرض النتيجة للمستخدم
                const resultDiv = document.getElementById('resultMessage');
                if (prize === 'حظ اوفر') {
                    resultDiv.innerHTML = '😅 <b>حظ أوفر!</b> 😅<br>جرب حظك غداً!';
                    resultDiv.style.color = '#ffaa66';
                } else {
                    resultDiv.innerHTML = `🎉 <b>مبروك!</b> 🎉<br>لقد ربحت: <span style="color:#ffd700; font-size:24px;">${prize}</span><br>اضغط على "تفعيل" في البوت للحصول على الجائزة!`;
                    resultDiv.style.color = '#ffd700';
                }
                
                // إظهار رسالة في WebApp
                tg.showPopup({
                    title: prize === 'حظ اوفر' ? '😅 حظ أوفر' : '🎉 مبروك!',
                    message: prize === 'حظ اوفر' ? 'لم تحصل على جائزة هذه المرة، جرب حظك غداً!' : `لقد ربحت ${prize}!\nاضغط على "تفعيل" في البوت للحصول على جائزتك.`,
                    buttons: [{type: 'ok', text: 'حسناً'}]
                });
                
                // إغلاق WebApp بعد 3 ثواني إذا كانت الجائزة ليست "حظ اوفر"
                if (prize !== 'حظ اوفر') {
                    setTimeout(() => {
                        tg.close();
                    }, 3000);
                } else {
                    setTimeout(() => {
                        tg.close();
                    }, 2000);
                }
            }
        }
        
        requestAnimationFrame(animateSpin);
    }
    
    function showError(msg) {
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-message';
        errorDiv.innerHTML = msg;
        document.querySelector('.container').appendChild(errorDiv);
        setTimeout(() => errorDiv.remove(), 5000);
    }
    
    // ==================== رابط الصورة الخلفية ====================
    // يمكنك تغيير رابط الصورة الخلفية هنا
    document.body.style.backgroundImage = "url('https://your-domain.com/background.jpg')"; // غيّر هذا الرابط
    document.body.style.backgroundSize = "cover";
    document.body.style.backgroundPosition = "center";
    document.body.style.backgroundRepeat = "no-repeat";
    document.body.style.backgroundAttachment = "fixed";
    
    // رابط الصورة في منتصف الدائرة
    // يمكنك استخدام الصورة التالية أو تغيير الرابط
    // const centerImg = new Image();
    // centerImg.src = "https://your-domain.com/center-logo.png";
    // centerImg.onload = () => drawWheel(currentAngle);
    
    // تهيئة العجلة
    drawWheel(currentAngle);
    
    // ربط زر التدوير
    document.getElementById('spinBtn').addEventListener('click', spinWheel);
    
    // إظهار حالة التحميل إذا كانت البيانات قادمة
    console.log('WebApp ready, userId:', userId, 'canSpin:', canSpin);
</script>
</body>
</html>
