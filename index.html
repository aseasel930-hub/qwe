<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>عجلة الحظ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .wheel-container {
            position: relative;
            margin: 20px auto;
            width: 300px;
            height: 300px;
        }

        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        #wheel {
            z-index: 1;
        }

        #pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ff4444;
            z-index: 2;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }

        .spin-btn {
            display: block;
            width: 80%;
            margin: 30px auto 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .spin-btn:active {
            transform: scale(0.95);
        }

        .spin-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        .timer {
            text-align: center;
            color: #666;
            margin-top: 15px;
            font-size: 14px;
        }

        .prize-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 15px;
        }

        .prize-item {
            text-align: center;
            padding: 8px;
            background: white;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
            color: #333;
        }

        .loading {
            text-align: center;
            color: #667eea;
            margin-top: 10px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎡 عجلة الحظ 🎡</h1>
        
        <div class="wheel-container">
            <canvas id="wheel" width="500" height="500"></canvas>
            <div id="pointer"></div>
        </div>
        
        <button class="spin-btn" id="spinBtn">🔄 تدوير</button>
        
        <div class="result" id="result">
            اضغط على زر التدوير
        </div>
        
        <div class="timer" id="timer"></div>
        
        <div class="prize-list">
            <div class="prize-item">😅 حظ أوفر</div>
            <div class="prize-item">💰 1000 SYP</div>
            <div class="prize-item">💰 2000 SYP</div>
            <div class="prize-item">💰 3000 SYP</div>
            <div class="prize-item">💰 4000 SYP</div>
            <div class="prize-item">💰 5000 SYP</div>
        </div>
    </div>

    <script>
        // ========== إعدادات المستخدم (قم بتعديلها) ==========
        const BOT_TOKEN = "8241270850:AAEtXORXapB_iqJStkcZ5IXNcba5O9mbnwY"; // ضع توكن البوت هنا
        const GROUP_ID = "-1003857532523"; // ضع معرف المجموعة المخصصة هنا (مع علامة - إذا كانت مجموعة)
        // ==================================================

        // الحصول على معرف المستخدم من الرابط
        function getUserIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('user_id');
        }

        const userId = getUserIdFromUrl();
        
        if (!userId) {
            document.getElementById('result').innerHTML = '❌ خطأ: لم يتم العثور على معرف المستخدم';
            document.getElementById('spinBtn').disabled = true;
        }

        // الجوائز والنسب
        const prizes = [
            { name: "😅 حظ أوفر", value: 0, probability: 30, color: "#ff6b6b" },
            { name: "💰 1000 SYP", value: 1000, probability: 25, color: "#4ecdc4" },
            { name: "💰 2000 SYP", value: 2000, probability: 20, color: "#45b7d1" },
            { name: "💰 3000 SYP", value: 3000, probability: 12, color: "#96ceb4" },
            { name: "💰 4000 SYP", value: 4000, probability: 8, color: "#ffeaa7" },
            { name: "💰 5000 SYP", value: 5000, probability: 5, color: "#dfe6e9" }
        ];

        let currentAngle = 0;
        let isSpinning = false;
        let lastSpinTime = null;

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultDiv = document.getElementById('result');
        const timerDiv = document.getElementById('timer');

        // رسم العجلة
        function drawWheel() {
            const size = 500;
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size / 2;
            const anglePerPrize = (Math.PI * 2) / prizes.length;

            ctx.clearRect(0, 0, size, size);
            
            for (let i = 0; i < prizes.length; i++) {
                const startAngle = currentAngle + i * anglePerPrize;
                const endAngle = startAngle + anglePerPrize;
                
                // رسم القطعة
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.fillStyle = prizes[i].color;
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // رسم النص
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + anglePerPrize / 2);
                ctx.textAlign = "center";
                ctx.fillStyle = "#333";
                ctx.font = "bold 14px 'Segoe UI'";
                const text = prizes[i].name.length > 8 ? prizes[i].name.substring(0, 6) + ".." : prizes[i].name;
                ctx.fillText(text, radius * 0.65, 10);
                ctx.restore();
            }
            
            // رسم الدائرة الداخلية
            ctx.beginPath();
            ctx.arc(centerX, centerY, 60, 0, Math.PI * 2);
            ctx.fillStyle = "white";
            ctx.fill();
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.fillStyle = "#333";
            ctx.font = "bold 24px 'Segoe UI'";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("🎡", centerX, centerY);
        }

        // اختيار جائزة عشوائية حسب النسب
        function getRandomPrize() {
            const random = Math.random() * 100;
            let cumulative = 0;
            
            for (let i = 0; i < prizes.length; i++) {
                cumulative += prizes[i].probability;
                if (random <= cumulative) {
                    return i;
                }
            }
            return 0;
        }

        // حساب زاوية التوقف للجائزة المحددة
        function calculateStopAngle(prizeIndex, currentRotations) {
            const anglePerPrize = (Math.PI * 2) / prizes.length;
            // المؤشر في الأعلى (270 درجة = 3π/2)
            const pointerAngle = (Math.PI * 3) / 2;
            
            // الزاوية المطلوبة للقطعة لتكون تحت المؤشر
            let targetAngle = (pointerAngle - (prizeIndex * anglePerPrize) - (anglePerPrize / 2));
            
            // إضافة الدورات الكاملة
            targetAngle += currentRotations * Math.PI * 2;
            
            return targetAngle;
        }

        // إرسال النتيجة إلى البوت عبر المجموعة
        async function sendResultToBot(prize) {
            const message = `🎡 عجلة الحظ 🎡\n👤 المستخدم: ${userId}\n🎁 الجائزة: ${prize.name}\n💰 القيمة: ${prize.value} SYP\n⏰ الوقت: ${new Date().toLocaleString('ar-SY')}`;
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: GROUP_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                return await response.json();
            } catch (error) {
                console.error('خطأ في إرسال النتيجة:', error);
            }
        }

        // التحقق من آخر مرة تم فيها التدوير
        async function checkLastSpin() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getChatMember`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: GROUP_ID,
                        user_id: parseInt(userId)
                    })
                });
                // هذا مجرد مثال - في الواقع سنستخدم متغير محلي
                return null;
            } catch (error) {
                return null;
            }
        }

        // حفظ وقت آخر تدوير (سيتم عبر البوت)
        function saveLastSpinTime() {
            localStorage.setItem(`last_spin_${userId}`, Date.now());
        }

        function getLastSpinTime() {
            return localStorage.getItem(`last_spin_${userId}`);
        }

        function canSpin() {
            const lastSpin = getLastSpinTime();
            if (!lastSpin) return true;
            const hoursSince = (Date.now() - parseInt(lastSpin)) / (1000 * 60 * 60);
            return hoursSince >= 24;
        }

        function getRemainingTime() {
            const lastSpin = getLastSpinTime();
            if (!lastSpin) return null;
            const remaining = 24 * 60 * 60 * 1000 - (Date.now() - parseInt(lastSpin));
            if (remaining <= 0) return null;
            const hours = Math.floor(remaining / (60 * 60 * 1000));
            const minutes = Math.floor((remaining % (60 * 60 * 1000)) / (60 * 1000));
            const seconds = Math.floor((remaining % (60 * 1000)) / 1000);
            return `${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function updateTimerDisplay() {
            const remaining = getRemainingTime();
            if (remaining) {
                timerDiv.innerHTML = `⏰ يمكنك التدوير مرة أخرى بعد: ${remaining}`;
                spinBtn.disabled = true;
            } else {
                timerDiv.innerHTML = `✅ يمكنك التدوير الآن!`;
                spinBtn.disabled = false;
            }
        }

        // وظيفة التدوير
        async function spin() {
            if (isSpinning) return;
            if (!canSpin()) {
                resultDiv.innerHTML = "❌ لا يمكنك التدوير إلا مرة كل 24 ساعة!";
                updateTimerDisplay();
                return;
            }
            
            isSpinning = true;
            spinBtn.disabled = true;
            
            const selectedPrizeIndex = getRandomPrize();
            const selectedPrize = prizes[selectedPrizeIndex];
            
            const rotations = 10 + Math.random() * 5;
            const stopAngle = calculateStopAngle(selectedPrizeIndex, rotations);
            
            const duration = 3000;
            const startTime = performance.now();
            const startAngle = currentAngle;
            
            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(1, elapsed / duration);
                
                // easing out cubic
                const easeOut = 1 - Math.pow(1 - progress, 3);
                
                currentAngle = startAngle + (stopAngle - startAngle) * easeOut;
                drawWheel();
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    currentAngle = stopAngle % (Math.PI * 2);
                    drawWheel();
                    
                    resultDiv.innerHTML = `🎉 ${selectedPrize.name} 🎉\n${selectedPrize.value > 0 ? `تم ربح ${selectedPrize.value} SYP` : 'حظ أوفر في المرة القادمة'}`;
                    
                    // إرسال النتيجة إلى البوت
                    await sendResultToBot(selectedPrize);
                    
                    // حفظ وقت آخر تدوير
                    saveLastSpinTime();
                    
                    isSpinning = false;
                    updateTimerDisplay();
                }
            }
            
            requestAnimationFrame(animate);
        }

        // بدء التشغيل
        drawWheel();
        spinBtn.onclick = spin;
        updateTimerDisplay();
        
        // تحديث المؤقت كل ثانية
        setInterval(updateTimerDisplay, 1000);
    </script>
</body>
</html>
