<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>عجلة الحظ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Tahoma', 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 550px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            font-size: 26px;
        }

        .wheel-wrapper {
            position: relative;
            margin: 20px auto;
            width: 320px;
            height: 320px;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #wheel {
            z-index: 1;
        }

        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 50px solid #ff4444;
            z-index: 2;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }

        .pointer::after {
            content: "▼";
            position: absolute;
            top: -55px;
            left: -12px;
            font-size: 24px;
            color: #ff4444;
            display: none;
        }

        .spin-btn {
            display: block;
            width: 200px;
            margin: 30px auto 20px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .spin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .spin-btn:active {
            transform: scale(0.95);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }

        .timer {
            text-align: center;
            color: #ff6b6b;
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
            background: #fff0f0;
            padding: 10px;
            border-radius: 10px;
        }

        .prizes-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 15px;
        }

        .prize-info-item {
            text-align: center;
            padding: 6px;
            background: white;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            color: #333;
        }

        .loading {
            text-align: center;
            color: #667eea;
            margin-top: 10px;
        }

        @keyframes spinWheel {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎡 عجلة الحظ 🎡</h1>
        
        <div class="wheel-wrapper">
            <canvas id="wheel" width="600" height="600"></canvas>
            <div class="pointer"></div>
        </div>
        
        <button class="spin-btn" id="spinBtn">🔄 تدوير</button>
        
        <div class="result" id="result">
            اضغط على زر التدوير
        </div>
        
        <div class="timer" id="timer"></div>
        
        <div class="prizes-info">
            <div class="prize-info-item">😅 حظ أوفر<br>30%</div>
            <div class="prize-info-item">💰 1000 SYP<br>25%</div>
            <div class="prize-info-item">💰 2000 SYP<br>20%</div>
            <div class="prize-info-item">💰 3000 SYP<br>12%</div>
            <div class="prize-info-item">💰 4000 SYP<br>8%</div>
            <div class="prize-info-item">💰 5000 SYP<br>5%</div>
        </div>
    </div>

    <script>
        // ========== إعدادات المستخدم (قم بتعديلها) ==========
        const BOT_TOKEN = "8241270850:AAEtXORXapB_iqJStkcZ5IXNcba5O9mbnwY";
        const GROUP_ID = "-1003857532523";
        // ==================================================

        // الحصول على معرف المستخدم من الرابط
        function getUserIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('user_id');
        }

        const userId = getUserIdFromUrl();
        
        if (!userId) {
            document.getElementById('result').innerHTML = '❌ خطأ: لم يتم العثور على معرف المستخدم';
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('spinBtn').style.opacity = '0.5';
        }

        // تعريف الجوائز (مقسومة بالتساوي على 6 أجزاء)
        const SEGMENTS = 6;
        const ANGLE_PER_SEGMENT = (Math.PI * 2) / SEGMENTS;
        
        const prizes = [
            { name: "😅 حظ أوفر", value: 0, probability: 30, color: "#FF6B6B", angle: 0 },
            { name: "💰 1000 SYP", value: 1000, probability: 25, color: "#4ECDC4", angle: 1 },
            { name: "💰 2000 SYP", value: 2000, probability: 20, color: "#45B7D1", angle: 2 },
            { name: "💰 3000 SYP", value: 3000, probability: 12, color: "#96CEB4", angle: 3 },
            { name: "💰 4000 SYP", value: 4000, probability: 8, color: "#FFEAA7", angle: 4 },
            { name: "💰 5000 SYP", value: 5000, probability: 5, color: "#DFE6E9", angle: 5 }
        ];

        let currentRotation = 0;
        let isSpinning = false;
        let animationId = null;
        
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultDiv = document.getElementById('result');
        const timerDiv = document.getElementById('timer');
        
        // تعيين حجم canvas
        canvas.width = 600;
        canvas.height = 600;

        // رسم العجلة
        function drawWheel(rotationAngle = 0) {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2 - 10;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < SEGMENTS; i++) {
                const startAngle = rotationAngle + (i * ANGLE_PER_SEGMENT);
                const endAngle = startAngle + ANGLE_PER_SEGMENT;
                const prize = prizes[i];
                
                // رسم القطعة
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.fillStyle = prize.color;
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // رسم النص
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + ANGLE_PER_SEGMENT / 2);
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillStyle = "#333";
                ctx.font = "bold 16px 'Tahoma', 'Segoe UI'";
                
                let text = prize.name;
                if (prize.value > 0) {
                    text = prize.value/1000 + "k";
                } else {
                    text = "🤷";
                }
                
                ctx.fillText(text, radius * 0.7, 5);
                ctx.restore();
            }
            
            // رسم الدائرة الداخلية
            ctx.beginPath();
            ctx.arc(centerX, centerY, 50, 0, Math.PI * 2);
            ctx.fillStyle = "#FFF";
            ctx.fill();
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // رسم النص في المنتصف
            ctx.fillStyle = "#333";
            ctx.font = "bold 30px 'Tahoma'";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("🎡", centerX, centerY);
        }

        // اختيار جائزة بناءً على النسب
        function selectPrizeByProbability() {
            const random = Math.random() * 100;
            let cumulative = 0;
            
            for (let i = 0; i < prizes.length; i++) {
                cumulative += prizes[i].probability;
                if (random <= cumulative) {
                    return i;
                }
            }
            return 0;
        }

        // حساب زاوية التوقف للجائزة المحددة
        function calculateStopRotation(prizeIndex, currentRotation) {
            // الزاوية المستهدفة للقطعة (نريد أن تكون تحت المؤشر)
            // المؤشر في الأعلى (زاوية -90 درجة أو 270 درجة)
            const pointerAngle = -Math.PI / 2;
            
            // الزاوية الحالية للقطعة المحددة (بدون الدوران)
            const segmentCenterAngle = (prizeIndex * ANGLE_PER_SEGMENT) + (ANGLE_PER_SEGMENT / 2);
            
            // الزاوية التي يجب أن تكون عليها العجلة لتقع القطعة تحت المؤشر
            let targetRotation = pointerAngle - segmentCenterAngle;
            
            // إضافة دورات كاملة لجعل العجلة تدور عدة مرات
            const fullRotations = 8 + Math.floor(Math.random() * 4); // 8-11 دورة كاملة
            targetRotation += (fullRotations * Math.PI * 2);
            
            // جعل الزاوية قريبة من الزاوية الحالية
            while (targetRotation <= currentRotation) {
                targetRotation += Math.PI * 2;
            }
            
            return targetRotation;
        }

        // إرسال النتيجة إلى البوت
        async function sendResultToBot(prize) {
            const message = `🎡 عجلة الحظ 🎡\n👤 المستخدم: ${userId}\n🎁 الجائزة: ${prize.name}\n💰 القيمة: ${prize.value} SYP\n⏰ الوقت: ${new Date().toLocaleString('ar-SY')}`;
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: GROUP_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                const data = await response.json();
                console.log('تم إرسال النتيجة:', data);
                return data;
            } catch (error) {
                console.error('خطأ في إرسال النتيجة:', error);
            }
        }

        // وظائف localStorage
        function getLastSpinTime() {
            const lastSpin = localStorage.getItem(`last_spin_${userId}`);
            return lastSpin ? parseInt(lastSpin) : null;
        }

        function saveLastSpinTime() {
            localStorage.setItem(`last_spin_${userId}`, Date.now());
        }

        function canSpin() {
            const lastSpin = getLastSpinTime();
            if (!lastSpin) return true;
            const hoursSince = (Date.now() - lastSpin) / (1000 * 60 * 60);
            return hoursSince >= 24;
        }

        function getRemainingTime() {
            const lastSpin = getLastSpinTime();
            if (!lastSpin) return null;
            const remaining = 24 * 60 * 60 * 1000 - (Date.now() - lastSpin);
            if (remaining <= 0) return null;
            
            const hours = Math.floor(remaining / (60 * 60 * 1000));
            const minutes = Math.floor((remaining % (60 * 60 * 1000)) / (60 * 1000));
            const seconds = Math.floor((remaining % (60 * 1000)) / 1000);
            
            return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function updateTimerDisplay() {
            const remaining = getRemainingTime();
            if (remaining) {
                timerDiv.innerHTML = `⏰ يمكنك التدوير مرة أخرى بعد: ${remaining}`;
                timerDiv.style.color = "#ff6b6b";
                spinBtn.disabled = true;
                spinBtn.style.opacity = "0.5";
            } else {
                timerDiv.innerHTML = `✅ يمكنك التدوير الآن!`;
                timerDiv.style.color = "#4ecdc4";
                spinBtn.disabled = false;
                spinBtn.style.opacity = "1";
            }
        }

        // وظيفة التدوير الرئيسية
        function spin() {
            if (isSpinning) {
                resultDiv.innerHTML = "⚠️ العجلة تدور حالياً، انتظر قليلاً";
                return;
            }
            
            if (!canSpin()) {
                const remaining = getRemainingTime();
                resultDiv.innerHTML = `❌ لا يمكنك التدوير إلا مرة كل 24 ساعة!\nالوقت المتبقي: ${remaining}`;
                updateTimerDisplay();
                return;
            }
            
            // اختيار الجائزة
            const selectedPrizeIndex = selectPrizeByProbability();
            const selectedPrize = prizes[selectedPrizeIndex];
            
            // حساب زاوية التوقف
            const targetRotation = calculateStopRotation(selectedPrizeIndex, currentRotation);
            const startRotation = currentRotation;
            const duration = 4000; // 4 ثواني
            const startTime = performance.now();
            
            isSpinning = true;
            spinBtn.disabled = true;
            spinBtn.style.opacity = "0.5";
            resultDiv.innerHTML = "🎡 العجلة تدور... 🎡";
            
            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(1, elapsed / duration);
                
                // استخدام easing out cubic للحركة السلسة
                const easeOut = 1 - Math.pow(1 - progress, 3);
                
                // حساب الدوران الحالي
                currentRotation = startRotation + (targetRotation - startRotation) * easeOut;
                
                // رسم العجلة
                drawWheel(currentRotation);
                
                if (progress < 1) {
                    animationId = requestAnimationFrame(animate);
                } else {
                    // انتهى الدوران
                    currentRotation = targetRotation % (Math.PI * 2);
                    drawWheel(currentRotation);
                    
                    // عرض النتيجة
                    if (selectedPrize.value > 0) {
                        resultDiv.innerHTML = `🎉 تهانينا! 🎉\n${selectedPrize.name}\n💰 ربحت ${selectedPrize.value} SYP`;
                    } else {
                        resultDiv.innerHTML = `😅 ${selectedPrize.name} 😅\nحظ أوفر في المرة القادمة`;
                    }
                    
                    // إرسال النتيجة إلى البوت
                    sendResultToBot(selectedPrize).then(() => {
                        console.log('تم إرسال النتيجة بنجاح');
                    }).catch(error => {
                        console.error('فشل إرسال النتيجة:', error);
                    });
                    
                    // حفظ وقت آخر تدوير
                    saveLastSpinTime();
                    
                    // إنهاء حالة الدوران
                    isSpinning = false;
                    spinBtn.disabled = false;
                    spinBtn.style.opacity = "1";
                    updateTimerDisplay();
                    
                    // إلغاء animationId
                    animationId = null;
                }
            }
            
            // بدء الأنيميشن
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            animationId = requestAnimationFrame(animate);
        }

        // ربط حدث الضغط على الزر
        spinBtn.onclick = spin;
        
        // رسم العجلة عند التحميل
        drawWheel(0);
        
        // تحديث المؤقت كل ثانية
        setInterval(updateTimerDisplay, 1000);
        
        // التحقق من الحالة عند التحميل
        updateTimerDisplay();
        
        console.log('تم تحميل العجلة بنجاح');
        console.log('معرف المستخدم:', userId);
    </script>
</body>
</html>
