<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>عجلة الحظ - Spin & Win</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }

        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ff4757;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
            z-index: 10;
        }

        .pointer::after {
            content: '▼';
            position: absolute;
            top: -45px;
            left: -12px;
            font-size: 24px;
            color: #ff4757;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .info {
            text-align: center;
            margin-top: 30px;
            color: white;
        }

        .result {
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            font-size: 18px;
            font-weight: bold;
        }

        .spin-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .spin-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .timer {
            font-size: 24px;
            font-weight: bold;
            color: #ffa502;
            margin-top: 10px;
        }

        .prizes-list {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .prize-badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            font-size: 24px;
        }

        @media (max-width: 480px) {
            .wheel-container {
                width: 280px;
                height: 280px;
            }
            .spin-btn {
                padding: 12px 30px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
        </div>
        <div class="info">
            <div class="result" id="result">اضغط على زر التدوير لحظك!</div>
            <button class="spin-btn" id="spinBtn">🎡 دوّر العجلة 🎡</button>
            <div class="timer" id="timer"></div>
            <div class="prizes-list">
                <span class="prize-badge">😅 حظ أوفر</span>
                <span class="prize-badge">💰 1000 SYP</span>
                <span class="prize-badge">💰 2000 SYP</span>
                <span class="prize-badge">💰 3000 SYP</span>
                <span class="prize-badge">💰 4000 SYP</span>
                <span class="prize-badge">💰 5000 SYP</span>
            </div>
        </div>
    </div>

    <script>
        // إعدادات العجلة
        const SEGMENTS = [
            { name: "😅 حظ أوفر", value: 0, probability: 30, color: "#ff6b6b" },
            { name: "💰 1000 SYP", value: 1000, probability: 20, color: "#4ecdc4" },
            { name: "💰 2000 SYP", value: 2000, probability: 17, color: "#45b7d1" },
            { name: "💰 3000 SYP", value: 3000, probability: 14, color: "#96ceb4" },
            { name: "💰 4000 SYP", value: 4000, probability: 11, color: "#ffeaa7" },
            { name: "💰 5000 SYP", value: 5000, probability: 8, color: "#dfe6e9" }
        ];

        const SEGMENT_ANGLE = 360 / SEGMENTS.length;
        let canvas = document.getElementById('wheelCanvas');
        let ctx = canvas.getContext('2d');
        let currentAngle = 0;
        let spinning = false;

        // الحصول على معلمات URL
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user_id');
        const botToken = urlParams.get('token');
        const chatId = urlParams.get('chat_id');

        // التحقق من وجود المعلمات المطلوبة
        if (!userId) {
            document.getElementById('result').innerHTML = '❌ خطأ: لم يتم التعرف على المستخدم';
            document.getElementById('spinBtn').disabled = true;
        }

        if (!botToken || !chatId) {
            document.getElementById('result').innerHTML = '⚠️ جاري تحميل الإعدادات...';
        }

        // الحصول على آخر وقت تدوير من localStorage
        function getLastSpinTime() {
            const lastSpin = localStorage.getItem(`last_spin_${userId}`);
            return lastSpin ? parseInt(lastSpin) : 0;
        }

        // حفظ وقت التدوير
        function setLastSpinTime() {
            localStorage.setItem(`last_spin_${userId}`, Date.now().toString());
        }

        // التحقق من إمكانية التدوير
        function canSpin() {
            const lastSpin = getLastSpinTime();
            if (lastSpin === 0) return true;
            const hoursPassed = (Date.now() - lastSpin) / (1000 * 60 * 60);
            return hoursPassed >= 24;
        }

        // عرض الوقت المتبقي
        function updateTimer() {
            const lastSpin = getLastSpinTime();
            if (lastSpin === 0) {
                document.getElementById('timer').innerHTML = '';
                return;
            }
            const hoursPassed = (Date.now() - lastSpin) / (1000 * 60 * 60);
            const remaining = 24 - hoursPassed;
            if (remaining > 0 && remaining < 24) {
                const hours = Math.floor(remaining);
                const minutes = Math.floor((remaining % 1) * 60);
                document.getElementById('timer').innerHTML = `⏰ يمكنك التدوير مرة أخرى بعد ${hours} ساعة و ${minutes} دقيقة`;
                document.getElementById('spinBtn').disabled = true;
            } else {
                document.getElementById('timer').innerHTML = '';
                document.getElementById('spinBtn').disabled = false;
            }
        }

        // إرسال النتيجة إلى البوت
        async function sendResultToBot(prize) {
            if (!botToken || !chatId) {
                console.error('❌ لا يوجد توكن البوت أو معرف المجموعة');
                return false;
            }

            const message = `🎡 SPIN_RESULT 🎡\nUSER_ID: ${userId}\nPRIZE: ${prize.name}\nVALUE: ${prize.value}\nTIME: ${Date.now()}`;
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                
                const result = await response.json();
                if (result.ok) {
                    console.log('✅ تم إرسال النتيجة بنجاح');
                    return true;
                } else {
                    console.error('❌ فشل الإرسال:', result);
                    return false;
                }
            } catch(e) {
                console.error('❌ خطأ في الإرسال:', e);
                return false;
            }
        }

        // رسم العجلة
        function drawWheel() {
            ctx.clearRect(0, 0, 500, 500);
            for (let i = 0; i < SEGMENTS.length; i++) {
                const startAngle = (currentAngle + i * SEGMENT_ANGLE) * Math.PI / 180;
                const endAngle = (currentAngle + (i + 1) * SEGMENT_ANGLE) * Math.PI / 180;
                
                ctx.beginPath();
                ctx.fillStyle = SEGMENTS[i].color;
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, startAngle, endAngle);
                ctx.fill();
                
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate((startAngle + endAngle) / 2);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 18px 'Segoe UI'";
                ctx.shadowBlur = 0;
                const shortName = SEGMENTS[i].name.split(' ')[0];
                ctx.fillText(shortName, 120, 10);
                ctx.restore();
            }
            
            // رسم الدائرة الداخلية
            ctx.beginPath();
            ctx.fillStyle = "#2c3e50";
            ctx.arc(250, 250, 60, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.font = "bold 24px 'Segoe UI'";
            ctx.fillText("🎡", 225, 265);
        }

        // اختيار الجائزة حسب النسب
        function selectPrize() {
            const random = Math.random() * 100;
            let cumulative = 0;
            for (let i = 0; i < SEGMENTS.length; i++) {
                cumulative += SEGMENTS[i].probability;
                if (random <= cumulative) {
                    return i;
                }
            }
            return 0;
        }

        // تدوير العجلة
        async function spinWheel() {
            if (spinning) return;
            
            if (!canSpin()) {
                updateTimer();
                document.getElementById('result').innerHTML = '⚠️ يمكنك التدوير مرة واحدة كل 24 ساعة!';
                return;
            }
            
            spinning = true;
            const spinBtn = document.getElementById('spinBtn');
            spinBtn.disabled = true;
            
            const selectedIndex = selectPrize();
            const targetPrize = SEGMENTS[selectedIndex];
            
            // حساب الزاوية المستهدفة
            const targetSegmentCenter = (selectedIndex * SEGMENT_ANGLE) + (SEGMENT_ANGLE / 2);
            let targetAngle = (360 - targetSegmentCenter) % 360;
            
            // دوران عشوائي
            const spins = 8 + Math.random() * 5;
            const finalAngle = currentAngle + (spins * 360) + targetAngle;
            
            const startTime = Date.now();
            const duration = 3000;
            
            function animate() {
                const now = Date.now();
                const elapsed = now - startTime;
                const progress = Math.min(1, elapsed / duration);
                
                // easeOutCubic
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                currentAngle = finalAngle * easeProgress;
                drawWheel();
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    currentAngle = finalAngle % 360;
                    drawWheel();
                    
                    // عرض النتيجة
                    if (targetPrize.value > 0) {
                        document.getElementById('result').innerHTML = `🎉 ${targetPrize.name} 🎉<br>✨ ربحت ${targetPrize.value} SYP ✨`;
                    } else {
                        document.getElementById('result').innerHTML = `😅 ${targetPrize.name} 😅<br>🍀 جرب حظك غداً!`;
                    }
                    
                    // حفظ وقت التدوير
                    setLastSpinTime();
                    
                    // إرسال النتيجة للبوت
                    const sent = await sendResultToBot(targetPrize);
                    
                    if (!sent) {
                        document.getElementById('result').innerHTML += '<br><span style="color: orange;">⚠️ حدث خطأ في تسجيل النتيجة، يرجى التواصل مع الدعم</span>';
                    }
                    
                    spinning = false;
                    
                    // تحديث المؤقت
                    setTimeout(() => {
                        updateTimer();
                    }, 1000);
                }
            }
            
            requestAnimationFrame(animate);
        }

        // تحديث المؤقت كل ثانية
        setInterval(updateTimer, 1000);
        
        // تهيئة العجلة
        function init() {
            drawWheel();
            updateTimer();
            document.getElementById('spinBtn').onclick = spinWheel;
        }
        
        // بدء التهيئة
        init();
    </script>
</body>
</html>
